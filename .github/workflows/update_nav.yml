name: Aggiorna NAV
on:
  schedule:
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

jobs:
  update-nav:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6          # ← Node.js 24

      - name: Configura Python 3.12
        uses: actions/setup-python@v6      # ← Node.js 24
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install -r scripts/requirements.txt

      - name: Esegui scraper NAV
        run: python scripts/fetch_nav.py

      - name: Commit e push nav.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nav.json
          git diff --cached --quiet || git commit -m "chore: aggiorna NAV [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
