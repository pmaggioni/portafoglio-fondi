name: Aggiorna NAV

on:
  schedule:
    # Lun-Ven alle 20:30 UTC (22:30 ora italiana, dopo chiusura mercati europei)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:  # Permette l'avvio manuale dalla UI GitHub

jobs:
  update-nav:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configura Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install -r scripts/requirements.txt

      - name: Esegui scraper NAV
        run: python scripts/fetch_nav.py

      - name: Commit e push nav.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nav.json
          # Committa solo se nav.json è cambiato
          git diff --cached --quiet || git commit -m "chore: aggiorna NAV [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
